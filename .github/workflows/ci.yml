name: CI

# Linux-only for v0.1. macOS and Windows mirrors of `kim-em/lean-csdp`'s
# workflow are deferred to v0.2 once the Linux pipeline is stable.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install BLAS / LAPACK
        run: |
          sudo apt-get update
          # `zstd` is required by our toolchain-install fallback and the
          # Mathlib cache get step.
          sudo apt-get install -y liblapack-dev libblas-dev gfortran zstd

      # Install elan and the toolchain pinned in lean-toolchain. Mirrors
      # lean-csdp's setup with retry + GitHub-release fallback.
      - name: Install elan and Lean toolchain
        shell: bash
        run: |
          set -e
          if ! command -v elan >/dev/null 2>&1; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          ./scripts/install-toolchain.sh

      - name: Fetch Mathlib cache
        run: lake exe cache get

      - name: Build Sos library + example exe
        run: lake build Sos sos-example

      - name: Run end-to-end smoke test
        run: |
          set +e
          ./.lake/build/bin/sos-example > /tmp/sos.out 2>&1
          rc=$?
          tail -25 /tmp/sos.out
          exit $rc

      - name: Verify sorry/axiom-free
        run: |
          if grep -rn '\bsorry\b\|^\s*axiom' Sos/; then
            echo "FAIL: sorry or axiom found in Sos/"
            exit 1
          fi
          echo "PASS: Sos/ has no sorry or axiom."
