name: CI

# Linux-only. macOS and Windows runners would mirror the BLAS/LAPACK
# install step from `kim-em/csdp-ffi`'s workflow.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install BLAS / LAPACK
        run: |
          sudo apt-get update
          sudo apt-get install -y liblapack-dev libblas-dev gfortran

      - name: Install elan
        shell: bash
        run: |
          set -e
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch Mathlib cache
        run: lake exe cache get

      - name: Check CSDP native dependencies
        run: |
          cd .lake/packages/CSDP
          lake script run checkNativeDeps

      - name: Build SOS
        run: lake build SOS

      - name: Run tests
        run: lake test

      - name: Verify sorry/axiom-free
        run: |
          if grep -rn '\bsorry\b\|^\s*axiom' SOS/; then
            echo "FAIL: sorry or axiom found in SOS/"
            exit 1
          fi
          echo "PASS: SOS/ has no sorry or axiom."
